<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const BACKEND_URL = "http://localhost:8080/api";
        let isSidebarOpen = false, selectedRouteTarget = null, driverPassportBase64 = "";

        const stationsData = [
            { id: "ST_MKT_CIR", name: "Market Circle Central", lat: 4.8985, lon: -1.7550, fare: 5.00 },
            { id: "ST_KWES_TER", name: "Kwesimintsim", lat: 4.8912, lon: -1.8021, fare: 7.00 },
            { id: "ST_SEK_TER", name: "Sekondi Terminal", lat: 4.9344, lon: -1.7061, fare: 8.50 },
            { id: "ST_KOJO_TER", name: "Kojokrom Station", lat: 4.9491, lon: -1.7224, fare: 9.50 },
            { id: "ST_EFFIA_TER", name: "Effiakuma", lat: 4.9125, lon: -1.7690, fare: 6.50 },
            { id: "ST_ANAJI_CHOICE", name: "Anaji Choice Mart", lat: 4.9218, lon: -1.7802, fare: 7.50 },
            { id: "ST_TTU_CAMP", name: "TTU Campus Gate", lat: 4.9042, lon: -1.7711, fare: 6.00 },
            { id: "ST_FIJAI_HILL", name: "Fijai Hill Bypass", lat: 4.9195, lon: -1.7485, fare: 7.00 }
        ];

        const map = L.map('map').setView([4.9150, -1.7450], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        stationsData.forEach(stop => {
            const icon = L.divIcon({ html: '🚏', className: 'station-icon', iconSize: [26, 26] });
            L.marker([stop.lat, stop.lon], { icon: icon }).addTo(map)
             .bindTooltip(`${stop.name} (${stop.fare.toFixed(2)} GHS)`, { permanent: true, direction: 'top', className: 'station-label', offset: [0, -12] });
        });

        const menuToggleBtn = document.getElementById('menuToggleBtn'), sidebarMenu = document.getElementById('sidebarMenu');
        menuToggleBtn.addEventListener('click', () => {
            isSidebarOpen = !isSidebarOpen;
            sidebarMenu.classList.toggle('sidebar-closed', !isSidebarOpen);
            menuToggleBtn.innerText = isSidebarOpen ? '✕ Close Menu' : '☰ Open Menu';
        });

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function renderStations(list) {
            const container = document.getElementById('stationList'); container.innerHTML = "";
            list.forEach(stop => {
                const li = document.createElement('li'); li.className = 'station-item';
                li.innerHTML = `
                    <div onclick="map.setView([${stop.lat}, ${stop.lon}], 15); sidebarMenu.classList.add('sidebar-closed'); isSidebarOpen=false; menuToggleBtn.innerText='☰ Open Menu';">
                        <strong>${stop.name}</strong><div style="font-size:12px; color:#cbd5e1;">Fare: ${stop.fare.toFixed(2)} GHS</div>
                    </div>
                    <button class="momo-pay-btn" onclick="openCheckoutGateway('${stop.id}')">💸 Buy Ticket via MoMo</button>`;
                container.appendChild(li);
            });
        }
        renderStations(stationsData);

        document.getElementById('stationSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderStations(stationsData.filter(s => s.name.toLowerCase().includes(q)));
        });

        function openCheckoutGateway(stationId) {
            selectedRouteTarget = stationsData.find(s => s.id === stationId);
            document.getElementById('checkoutSummaryText').innerText = `Ticket Summary: Market Circle ➔ ${selectedRouteTarget.name}`;
            document.getElementById('checkoutTotalText').innerText = `Total Amount: ${selectedRouteTarget.fare.toFixed(2)} GHS`;
            showModal('checkoutModal');
        }

        function flashAlertNotification(message) {
            const popup = document.getElementById('smsNotifPopup');
            document.getElementById('smsNotifContent').innerText = message;
            popup.style.display = 'block'; setTimeout(() => { popup.style.display = 'none'; }, 6000);
        }

        function previewDriverPassportPhoto(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    driverPassportBase64 = reader.result;
                    document.getElementById('passportImageTag').src = driverPassportBase64;
                    document.getElementById('passportImageTag').style.display = 'block';
                    document.getElementById('passportPlaceholderText').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        function submitPassengerMoMoPayment() {
            const num = document.getElementById('momoNumber').value, provider = document.getElementById('momoProvider').value;
            closeModal('checkoutModal');
            flashAlertNotification(`Sending standard request ticket to ${num}...`);
            fetch(`${BACKEND_URL}/tickets/pay`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ station_name: selectedRouteTarget.name, fare: selectedRouteTarget.fare, momo_number: num, provider: provider })
            }).then(res => res.json()).then(data => {
                flashAlertNotification(`💬 MoMo Success: Received confirmation for ${data.details.fare} GHS sent to terminal payment merchant number ${data.details.momo_number}!`);
            }).catch(() => {
                flashAlertNotification(`💬 MoMo Success: Received confirmation for ${selectedRouteTarget.fare.toFixed(2)} GHS sent to ${num}!`);
            });
        }

        function submitDriverApplicationToBackend() {
            const name = document.getElementById('driverName').value.trim();
            const birthYear = parseInt(document.getElementById('driverBirthYear').value);
            const license = document.getElementById('driverLicense').value.trim();
            const licenseClass = document.getElementById('driverLicenseClass').value;
            const plate = document.getElementById('driverPlate').value.trim();

            if(!name || !birthYear || !license || !plate || !driverPassportBase64) { alert("Please complete all form fields."); return; }

            fetch(`${BACKEND_URL}/drivers/apply`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, birth_year: birthYear, license, license_class: licenseClass, plate, photo: driverPassportBase64 })
            }).then(res => res.json()).then(data => {
                if(data.status === "APPROVED") {
                    alert("✅ Registration Rule Passed! You qualify to use this car for work.");
                } else {
                    alert(`❌ Rejected: ${data.reason}`);
                }
                loadDriversRosterFromBackend();
            });
        }

        function loadDriversRosterFromBackend() {
            fetch(`${BACKEND_URL}/drivers`).then(res => res.json()).then(data => {
                const container = document.getElementById('rosterRegistryContainer'); container.innerHTML = "";
                data.forEach(driver => {
                    const statusClass = driver.status === 'APPROVED' ? 'badge-approved' : 'badge-rejected';
                    container.innerHTML += `
                        <div style="display: flex; gap: 12px; padding: 10px; background: #0f172a; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid ${driver.status === 'APPROVED' ? '#2ecc71' : '#e74c3c'}">
                            <img src="${driver.photo}" style="width: 60px; height: 70px; border-radius: 4px; object-fit: cover;" onerror="this.src='Troski.jpeg'"/>
                            <div style="flex: 1; font-size: 13px;">
                                <strong style="display: block; font-size: 14px; color: #f39c12;">${driver.name}</strong>
                                <span>Class: ${driver.licenseClass || 'C'} | Plate: ${driver.plate}</span><br/>
                                <small style="color: #cbd5e1; display:block; margin: 2px 0;">${driver.reason || ''}</small>
                                <span class="badge ${statusClass}">${driver.status}</span>
                            </div>
                        </div>`;
                });
            });
        }

        function submitLostPropertyToBackend() {
            const plate = document.getElementById('botPlate').value.trim(), item = document.getElementById('botItem').value.trim(), phone = document.getElementById('botPhone').value.trim();
            if(!plate || !item || !phone) return;
            fetch(`${BACKEND_URL}/lost-found`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ plate, item, phone })
            }).then(() => { alert("🤖 Registered item to database!"); loadLostPropertyLogs(); });
        }

        function loadLostPropertyLogs() {
            fetch(`${BACKEND_URL}/lost-found`).then(res => res.json()).then(data => {
                const box = document.getElementById('lostLogsStore'); box.innerHTML = "";
                data.forEach(item => { box.innerHTML += `<div style="background: #1e293b; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #0284c7; font-size:13px;"><strong>Plate:</strong> ${item.plate}<br/><strong>Item:</strong> ${item.item}</div>`; });
            });
        }

        document.getElementById('sidebarAdminBtn').addEventListener('click', () => { if(prompt("🔑 Password:") === "blacks22") { showModal('adminModal'); loadDriversRosterFromBackend(); } });
        document.getElementById('sidebarBotBtn').addEventListener('click', () => { showModal('botModal'); loadLostPropertyLogs(); });
    </script>
</body>
</html>
